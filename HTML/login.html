<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/login.css">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="form-box active" id="login-form">
            <form action="">
                <h2>Login</h2>
                <input type="rollno" name="rollno" placeholder="Enter The Roll Number" required>
                <input type="email" name="email" placeholder="Enter The Registered Mail" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" name="login">LOGIN</button>
                <p>Dont Have an Account ?<a href="#" onclick="showForm('register-form')">Register</a></p>
            </form>
        </div>

     <div class="form-box" id="register-form">
            <form action="">
                <h2>Register</h2>
                <input type="text" name="Name" placeholder="Name" required>
                <input type="rollno" name="rollno" placeholder="Roll Number" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <select name="role" required>
                    <option value="">--Select Role--</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" name="login">Register</button>
                <p>Already Have an Account ?<a href="#" onclick="showForm('login-form')">Login</a></p>
            </form>
        </div>
    </div>

    <script src="../JavaScript/login.js"></script>
</body>
</html>
