<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - To-Do Calendar</title>
  <link rel="stylesheet" href="../CSS/admin.css">
</head>
<body>
  <div class="admin-container">
    <header>
      <h1>Admin Dashboard</h1>
      <button id="theme-toggle">🌞</button>
    </header>

    <section class="stats">
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending Tasks</h3>
        <p id="pendingTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Completed Tasks</h3>
        <p id="completedTasks">0</p>
      </div>
    </section>

    <section class="task-table">
      <h2>📋 All User Tasks</h2>
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Deadline</th>
            <th>Time Left</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="adminTasks"></tbody>
      </table>
    </section>
  </div>

  <script src="../JavaScript/admin.js"></script>
</body>
</html>
